name: Olist Production Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * *'

env:
  POSTGRES_DB: olist_dw
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: postgres
  POSTGRES_HOST: localhost
  POSTGRES_PORT: 5432

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: ${{ env.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ env.POSTGRES_DB }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          --shm-size=1gb

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Python Dependencies
        run: |
          pip install -r requirements.txt
          pip install dbt-postgres

      - name: 1. Verify Postgres is ready
        run: |
          for i in {1..30}; do
            if pg_isready -h localhost -p 5432 -U ${{ env.POSTGRES_USER }}; then
              echo "✅ Postgres ready"
              break
            fi
            echo "⏳ Waiting for Postgres ($i/30)..."
            sleep 2
          done || exit 1

      - name: 2. Run Data Ingestion
        env:
          POSTGRES_USER: ${{ env.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ env.POSTGRES_DB }}
          POSTGRES_HOST: ${{ env.POSTGRES_HOST }}
          POSTGRES_PORT: ${{ env.POSTGRES_PORT }}
        run: python ingestion/load_raw.py

      - name: 3. Verify Raw Tables Loaded
        run: |
          psql "postgresql://${{ env.POSTGRES_USER }}:${{ env.POSTGRES_PASSWORD }}@localhost:5432/${{ env.POSTGRES_DB }}" -c "
            SELECT schemaname, tablename, 
                   (xpath('/root/row/c/tableoid/text()', xmlelement(name root, query_to_xml(format('select * from pg_tables where schemaname=%L and tablename=%L', schemaname, tablename), false, true, ''))))::text::int AS oid
            FROM pg_tables WHERE schemaname = 'raw';
          "

      - name: 4. dbt Debug & Parse
        working-directory: ./olist_transform
        env:
          POSTGRES_USER: ${{ env.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ env.POSTGRES_DB }}
        run: |
          dbt debug --profiles-dir .
          dbt parse --profiles-dir .

      - name: 5. dbt Run (Transformations)
        working-directory: ./olist_transform
        env:
          POSTGRES_USER: ${{ env.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ env.POSTGRES_DB }}
        run: |
          dbt deps
          dbt clean
          dbt run --target prod --profiles-dir .

      - name: 6. dbt Tests
        if: success()
        working-directory: ./olist_transform
        env:
          POSTGRES_USER: ${{ env.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ env.POSTGRES_DB }}
        run: |
          dbt test --target prod --profiles-dir .

      - name: 7. Data Quality Gate
        if: success()
        env:
          POSTGRES_USER: ${{ env.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ env.POSTGRES_DB }}
          POSTGRES_HOST: ${{ env.POSTGRES_HOST }}
          POSTGRES_PORT: ${{ env.POSTGRES_PORT }}
        run: python run_quality_check.py

      - name: 8. Upload dbt Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dbt-logs-${{ github.run_id }}
          path: |
            olist_transform/target/
            olist_transform/logs/
          retention-days: 7
